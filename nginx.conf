server {
    listen 8007;
    server_name localhost;

    # Set compression for optimal performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Support /lasbugambilias/ subpath securely without redirects
    location /lasbugambilias/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Handle exact path without trailing slash without doing a 301/302 redirect
    location ~ ^/lasbugambilias/?$ {
        try_files /index.html =404;
    }

    # Support root / path (when path is stripped/forwarded at root level)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static Assets Cache-Control
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Handle error pages with a customizable template standard
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
